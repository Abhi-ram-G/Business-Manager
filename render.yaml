services:
  - type: web
    name: business-manager-backend
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_POOLER_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://business-management.netlify.app,https://business-manager-ecru-chi.vercel.app
      - key: ALLOWED_ORIGIN_REGEX
        value: ^(https://.*\\.vercel\\.app|https://.*\\.netlify\\.app)$
